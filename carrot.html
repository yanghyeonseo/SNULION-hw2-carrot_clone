<!doctype html>

  <body>

            <input type="text" placeholder="물품이나 동네를 검색해보세요" />
          </form>
          <form>
            <button type="button">채팅하기</button>

        </section>

            <h1>
              당신 근처의

      <section id="first" class="info-section">

          <img
            id="main-img"
            src="./assets/image/info_img_1.webp"

            height="750px"
          />

            <h1 class="info-head">믿을만한<br />이웃 간 중고거래</h1>
            <p class="info-detail">
              동네 주민들과 가깝고 따뜻한 거래를<br />지금 경험해보세요.
            </p>
            <div class="button-container">
              <button class="info-button">인기매물 보기</button>
              <button class="info-button">믿을 수 있는 중고거래</button>
            </div>
